<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Top 10 Customers by Revenue</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1d2e 0%, #16213e 100%);
      border-bottom: 1px solid #2d3748;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f1f5f9;
    }

    header p {
      font-size: 0.82rem;
      color: #94a3b8;
      margin-top: 2px;
    }

    .badge {
      margin-left: auto;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .badge span { color: #6366f1; font-weight: 600; }

    main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

    /* Loading */
    #loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 60vh; gap: 16px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #2d3748;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #64748b; font-size: 0.95rem; }

    /* KPI Cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .kpi-card {
      background: #1e293b;
      border: 1px solid #2d3748;
      border-radius: 14px;
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .kpi-card:hover { transform: translateY(-2px); border-color: #6366f1; }

    .kpi-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .kpi-card:nth-child(1)::before { background: linear-gradient(90deg, #6366f1, #8b5cf6); }
    .kpi-card:nth-child(2)::before { background: linear-gradient(90deg, #06b6d4, #3b82f6); }
    .kpi-card:nth-child(3)::before { background: linear-gradient(90deg, #10b981, #06b6d4); }
    .kpi-card:nth-child(4)::before { background: linear-gradient(90deg, #f59e0b, #ef4444); }

    .kpi-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 8px;
    }
    .kpi-value {
      font-size: 1.75rem;
      font-weight: 800;
      color: #f1f5f9;
      line-height: 1;
    }
    .kpi-sub {
      font-size: 0.78rem;
      color: #94a3b8;
      margin-top: 6px;
    }
    .kpi-icon {
      position: absolute; right: 20px; top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      opacity: 0.6;
    }

    /* Filters */
    .filters {
      background: #1e293b;
      border: 1px solid #2d3748;
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 28px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-group label {
      font-size: 0.78rem;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 4px;
    }

    .filters input, .filters select {
      background: #0f1117;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 8px 14px;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .filters input:focus, .filters select:focus { border-color: #6366f1; }
    .filters input { width: 220px; }

    .filter-group { display: flex; align-items: center; gap: 8px; }

    #resetBtn {
      margin-left: auto;
      background: transparent;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    #resetBtn:hover { border-color: #6366f1; color: #6366f1; }

    /* Charts */
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    @media (max-width: 900px) {
      .charts-grid { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: #1e293b;
      border: 1px solid #2d3748;
      border-radius: 14px;
      padding: 24px;
    }

    .chart-card h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chart-card h2::before {
      content: '';
      display: inline-block;
      width: 4px; height: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 2px;
    }

    .chart-wrapper { position: relative; height: 300px; }

    /* Table */
    .table-card {
      background: #1e293b;
      border: 1px solid #2d3748;
      border-radius: 14px;
      padding: 24px;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .table-card h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .table-card h2::before {
      content: '';
      display: inline-block;
      width: 4px; height: 16px;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      border-radius: 2px;
    }

    #rowCount {
      font-size: 0.78rem;
      color: #64748b;
      background: #0f1117;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 3px 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    thead th {
      text-align: left;
      padding: 10px 14px;
      color: #64748b;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid #2d3748;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    thead th:hover { color: #a5b4fc; }
    thead th .sort-icon { margin-left: 4px; opacity: 0.5; }
    thead th.active .sort-icon { opacity: 1; color: #6366f1; }

    tbody tr {
      border-bottom: 1px solid #1a2234;
      transition: background 0.15s;
    }
    tbody tr:hover { background: #273044; }
    tbody tr:last-child { border-bottom: none; }

    tbody td {
      padding: 13px 14px;
      color: #cbd5e1;
    }

    .rank-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.8rem;
    }
    .rank-1 { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .rank-2 { background: rgba(148,163,184,0.2); color: #94a3b8; }
    .rank-3 { background: rgba(180,120,80,0.2); color: #b47850; }
    .rank-other { background: rgba(99,102,241,0.1); color: #818cf8; }

    .revenue-bar-wrap {
      display: flex; align-items: center; gap: 10px;
    }
    .revenue-bar {
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      transition: width 0.4s ease;
    }

    .no-data {
      text-align: center;
      padding: 40px;
      color: #475569;
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .pagination-info {
      font-size: 0.8rem;
      color: #64748b;
    }
    .pagination-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .page-btn {
      background: #0f1117;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 6px 12px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: all 0.15s;
      min-width: 34px;
      text-align: center;
    }
    .page-btn:hover:not(:disabled) { border-color: #6366f1; color: #a5b4fc; }
    .page-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; font-weight: 700; }
    .page-btn:disabled { opacity: 0.3; cursor: default; }
    .page-size-select {
      background: #0f1117;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 6px 10px;
      border-radius: 7px;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
    }
    .page-size-select:focus { border-color: #6366f1; }

    #dashboard { display: none; }
  </style>
<script>window.__DATA__=[];window.loadData=async function(){try{const r=await fetch('/api/data');if(r.ok){const j=await r.json();if(Array.isArray(j.rows))return j.rows;}}catch(e){}return window.__DATA__;};</script></head>
<body>

<header>
  <div class="logo">📊</div>
  <div>
    <h1>Customer Revenue Dashboard</h1>
    <p>ServiceTitan · Top Customers by Total Invoice Revenue</p>
  </div>
  <div class="badge">Source: <span>invoices</span></div>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading customer data…</p>
  </div>

  <div id="dashboard">
    <!-- KPI Cards -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="searchInput" placeholder="Customer name…" />
      </div>
      <div class="filter-group">
        <label>Sort by</label>
        <select id="sortSelect">
          <option value="revenue-desc">Revenue ↓</option>
          <option value="revenue-asc">Revenue ↑</option>
          <option value="name-asc">Name A–Z</option>
          <option value="name-desc">Name Z–A</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Min Revenue</label>
        <input type="number" id="minRevenue" placeholder="e.g. 100000" style="width:160px"/>
      </div>
      <button id="resetBtn">↺ Reset</button>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="chart-card">
        <h2>Revenue by Customer</h2>
        <div class="chart-wrapper">
          <canvas id="barChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <h2>Revenue Share</h2>
        <div class="chart-wrapper">
          <canvas id="donutChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-header">
        <h2>Customer Breakdown</h2>
        <span id="rowCount"></span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th class="sortable" data-col="customer_name">Customer <span class="sort-icon">↕</span></th>
            <th class="sortable" data-col="customer_id">ID <span class="sort-icon">↕</span></th>
            <th class="sortable active" data-col="total_revenue">Total Revenue <span class="sort-icon">↓</span></th>
            <th>Share of Total</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
  Chart.defaults.color = '#e2e8f0';

  let allData = [];
  let filteredData = [];
  let barChart, donutChart;
  let currentSortCol = 'total_revenue';
  let currentSortDir = 'desc';
  let currentPage = 1;
  let pageSize = 5;

  const COLORS = [
    '#6366f1','#8b5cf6','#06b6d4','#3b82f6','#10b981',
    '#f59e0b','#ef4444','#ec4899','#14b8a6','#f97316'
  ];

  const fmt = v => '$' + Number(v).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
  const fmtShort = v => {
    const n = Number(v);
    if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
    if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
    return '$' + n.toFixed(0);
  };

  async function init() {
    const rows = await loadData();
    allData = rows.map(r => ({
      customer_id: r.customer_id,
      customer_name: r.customer_name,
      total_revenue: parseFloat(r.total_revenue)
    }));
    filteredData = [...allData];

    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    renderKPIs(allData);
    applyFilters();
    setupEvents();
  }

  function renderKPIs(data) {
    const total = data.reduce((s,r) => s + r.total_revenue, 0);
    const avg = total / data.length;
    const top = data[0];
    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi-card">
        <div class="kpi-label">Total Revenue</div>
        <div class="kpi-value">${fmtShort(total)}</div>
        <div class="kpi-sub">Across top 10 customers</div>
        <div class="kpi-icon">💰</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Customers</div>
        <div class="kpi-value">${data.length}</div>
        <div class="kpi-sub">Filtered results</div>
        <div class="kpi-icon">🏢</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Avg Revenue</div>
        <div class="kpi-value">${fmtShort(avg)}</div>
        <div class="kpi-sub">Per customer</div>
        <div class="kpi-icon">📈</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Top Customer</div>
        <div class="kpi-value">${fmtShort(top.total_revenue)}</div>
        <div class="kpi-sub">${top.customer_name}</div>
        <div class="kpi-icon">🥇</div>
      </div>
    `;
  }

  function syncDropdownToState() {
    const sel = document.getElementById('sortSelect');
    if (currentSortCol === 'total_revenue') {
      sel.value = currentSortDir === 'asc' ? 'revenue-asc' : 'revenue-desc';
    } else if (currentSortCol === 'customer_name') {
      sel.value = currentSortDir === 'asc' ? 'name-asc' : 'name-desc';
    }
  }

  function syncStateToDropdown() {
    const sort = document.getElementById('sortSelect').value;
    if (sort === 'revenue-desc') { currentSortCol = 'total_revenue'; currentSortDir = 'desc'; }
    else if (sort === 'revenue-asc') { currentSortCol = 'total_revenue'; currentSortDir = 'asc'; }
    else if (sort === 'name-asc') { currentSortCol = 'customer_name'; currentSortDir = 'asc'; }
    else if (sort === 'name-desc') { currentSortCol = 'customer_name'; currentSortDir = 'desc'; }
  }

  function applyFilters(source) {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    const minRev = parseFloat(document.getElementById('minRevenue').value) || 0;

    // Keep sort state and dropdown in sync depending on what triggered the filter
    if (source === 'dropdown') {
      syncStateToDropdown();
    } else {
      syncDropdownToState();
    }

    currentPage = 1;
    filteredData = allData.filter(r => {
      if (search && !r.customer_name.toLowerCase().includes(search)) return false;
      if (r.total_revenue < minRev) return false;
      return true;
    });

    filteredData.sort((a, b) => {
      let valA = a[currentSortCol];
      let valB = b[currentSortCol];
      if (currentSortCol === 'total_revenue' || currentSortCol === 'customer_id') {
        valA = parseFloat(valA); valB = parseFloat(valB);
        return currentSortDir === 'asc' ? valA - valB : valB - valA;
      }
      return currentSortDir === 'asc'
        ? String(valA).localeCompare(String(valB))
        : String(valB).localeCompare(String(valA));
    });

    renderKPIs(filteredData.length ? filteredData : allData);
    renderCharts();
    renderTable();
  }

  function renderCharts() {
    const labels = filteredData.map(r => r.customer_name.length > 18
      ? r.customer_name.slice(0,18) + '…'
      : r.customer_name);
    const values = filteredData.map(r => r.total_revenue);
    const colors = filteredData.map((_, i) => COLORS[i % COLORS.length]);

    if (barChart) barChart.destroy();
    barChart = new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Total Revenue',
          data: values,
          backgroundColor: colors.map(c => c + 'cc'),
          borderColor: colors,
          borderWidth: 1.5,
          borderRadius: 6,
          borderSkipped: false
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1e293b',
            borderColor: '#334155',
            borderWidth: 1,
            titleColor: '#f1f5f9',
            bodyColor: '#94a3b8',
            callbacks: {
              label: ctx => ' ' + fmt(ctx.parsed.y)
            }
          }
        },
        scales: {
          x: {
            ticks: { color: '#ffffff', font: { size: 11 }, maxRotation: 35 },
            grid: { color: '#1a2234' }
          },
          y: {
            ticks: { color: '#94a3b8', font: { size: 11 }, callback: v => fmtShort(v) },
            grid: { color: '#1a2234' }
          }
        }
      }
    });

    if (donutChart) donutChart.destroy();
    donutChart = new Chart(document.getElementById('donutChart'), {
      type: 'doughnut',
      data: {
        labels: filteredData.map(r => r.customer_name),
        datasets: [{
          data: values,
          backgroundColor: colors.map(c => c + 'cc'),
          borderColor: '#1e293b',
          borderWidth: 3,
          hoverOffset: 8
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '62%',
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              color: '#e2e8f0',
              font: { size: 12, weight: '600' },
              boxWidth: 12,
              padding: 10,
              generateLabels: chart => {
                const data = chart.data;
                return data.labels.map((label, i) => ({
                  text: label.length > 16 ? label.slice(0, 16) + '…' : label,
                  fillStyle: data.datasets[0].backgroundColor[i],
                  strokeStyle: 'transparent',
                  fontColor: '#e2e8f0',
                  color: '#e2e8f0',
                  hidden: false,
                  index: i,
                  datasetIndex: 0
                }));
              }
            }
          },
          tooltip: {
            backgroundColor: '#1e293b',
            borderColor: '#334155',
            borderWidth: 1,
            titleColor: '#f1f5f9',
            bodyColor: '#94a3b8',
            callbacks: {
              label: ctx => {
                const total = ctx.dataset.data.reduce((a,b)=>a+b,0);
                const pct = ((ctx.parsed/total)*100).toFixed(1);
                return ` ${fmt(ctx.parsed)} (${pct}%)`;
              }
            }
          }
        }
      }
    });
  }

  function renderTable() {
    const grandTotal = filteredData.reduce((s,r) => s + r.total_revenue, 0);
    const maxRev = Math.max(...filteredData.map(r => r.total_revenue));
    const tbody = document.getElementById('tableBody');
    document.getElementById('rowCount').textContent = `${filteredData.length} customer${filteredData.length !== 1 ? 's' : ''}`;

    // Update sort indicators
    document.querySelectorAll('thead th.sortable').forEach(th => {
      th.classList.remove('active');
      const icon = th.querySelector('.sort-icon');
      if (th.dataset.col === currentSortCol) {
        th.classList.add('active');
        icon.textContent = currentSortDir === 'asc' ? '↑' : '↓';
      } else {
        icon.textContent = '↕';
      }
    });

    if (!filteredData.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="no-data">No customers match your filters.</td></tr>`;
      renderPagination(0);
      return;
    }

    const totalPages = Math.ceil(filteredData.length / pageSize);
    if (currentPage > totalPages) currentPage = totalPages;

    const start = (currentPage - 1) * pageSize;
    const pageData = filteredData.slice(start, start + pageSize);

    tbody.innerHTML = pageData.map((r, i) => {
      const globalIndex = start + i;
      const share = grandTotal ? ((r.total_revenue / grandTotal) * 100).toFixed(1) : 0;
      const barW = maxRev ? (r.total_revenue / maxRev * 100).toFixed(1) : 0;
      const rankClass = globalIndex === 0 ? 'rank-1' : globalIndex === 1 ? 'rank-2' : globalIndex === 2 ? 'rank-3' : 'rank-other';
      return `
        <tr>
          <td><span class="rank-badge ${rankClass}">${globalIndex+1}</span></td>
          <td style="font-weight:600;color:#f1f5f9">${r.customer_name}</td>
          <td style="color:#64748b;font-size:0.82rem">${r.customer_id}</td>
          <td style="font-weight:700;color:#a5b4fc">${fmt(r.total_revenue)}</td>
          <td>
            <div class="revenue-bar-wrap">
              <div class="revenue-bar" style="width:${barW}%;min-width:4px;max-width:120px"></div>
              <span style="color:#94a3b8;font-size:0.8rem">${share}%</span>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    let el = document.getElementById('paginationBar');
    if (!el) {
      el = document.createElement('div');
      el.id = 'paginationBar';
      document.querySelector('.table-card').appendChild(el);
    }

    if (totalPages <= 1 && filteredData.length === 0) {
      el.innerHTML = '';
      return;
    }

    const start = (currentPage - 1) * pageSize + 1;
    const end = Math.min(currentPage * pageSize, filteredData.length);

    // Build page number buttons (show up to 5 around current)
    let pageBtns = '';
    const delta = 2;
    const left = Math.max(1, currentPage - delta);
    const right = Math.min(totalPages, currentPage + delta);

    if (left > 1) pageBtns += `<button class="page-btn" data-page="1">1</button>`;
    if (left > 2) pageBtns += `<span style="color:#475569;padding:0 2px">…</span>`;
    for (let p = left; p <= right; p++) {
      pageBtns += `<button class="page-btn ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`;
    }
    if (right < totalPages - 1) pageBtns += `<span style="color:#475569;padding:0 2px">…</span>`;
    if (right < totalPages) pageBtns += `<button class="page-btn" data-page="${totalPages}">${totalPages}</button>`;

    el.innerHTML = `
      <div class="pagination">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="pagination-info">Showing ${start}–${end} of ${filteredData.length}</span>
          <select class="page-size-select" id="pageSizeSelect">
            <option value="5" ${pageSize===5?'selected':''}>5 / page</option>
            <option value="10" ${pageSize===10?'selected':''}>10 / page</option>
            <option value="20" ${pageSize===20?'selected':''}>20 / page</option>
          </select>
        </div>
        <div class="pagination-controls">
          <button class="page-btn" id="prevBtn" ${currentPage===1?'disabled':''}>‹ Prev</button>
          ${pageBtns}
          <button class="page-btn" id="nextBtn" ${currentPage===totalPages?'disabled':''}>Next ›</button>
        </div>
      </div>
    `;

    document.getElementById('prevBtn').addEventListener('click', () => { currentPage--; renderTable(); });
    document.getElementById('nextBtn').addEventListener('click', () => { currentPage++; renderTable(); });
    document.getElementById('pageSizeSelect').addEventListener('change', e => {
      pageSize = parseInt(e.target.value);
      currentPage = 1;
      renderTable();
    });
    el.querySelectorAll('.page-btn[data-page]').forEach(btn => {
      btn.addEventListener('click', () => {
        currentPage = parseInt(btn.dataset.page);
        renderTable();
      });
    });
  }

  function setupEvents() {
    document.getElementById('searchInput').addEventListener('input', () => applyFilters('other'));
    document.getElementById('sortSelect').addEventListener('change', () => applyFilters('dropdown'));
    document.getElementById('minRevenue').addEventListener('input', () => applyFilters('other'));
    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      document.getElementById('sortSelect').value = 'revenue-desc';
      document.getElementById('minRevenue').value = '';
      currentSortCol = 'total_revenue';
      currentSortDir = 'desc';
      currentPage = 1;
      applyFilters('other');
    });

    document.querySelectorAll('thead th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (currentSortCol === col) {
          currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
        } else {
          currentSortCol = col;
          currentSortDir = col === 'total_revenue' ? 'desc' : 'asc';
        }
        applyFilters('column');
      });
    });
  }

  init();
</script>
