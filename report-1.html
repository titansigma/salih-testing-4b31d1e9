<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ServiceTitan Customer Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid #334155;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header .logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #f97316, #ef4444);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; color: #f1f5f9; }
    header p { font-size: 0.78rem; color: #64748b; margin-top: 2px; }

    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 60vh; flex-direction: column; gap: 16px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #1e293b;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #dashboard { display: none; padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

    /* KPI Cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .kpi-card.orange::before { background: linear-gradient(90deg, #f97316, #fb923c); }
    .kpi-card.blue::before   { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
    .kpi-card.green::before  { background: linear-gradient(90deg, #22c55e, #4ade80); }
    .kpi-card.red::before    { background: linear-gradient(90deg, #ef4444, #f87171); }
    .kpi-card.purple::before { background: linear-gradient(90deg, #a855f7, #c084fc); }

    .kpi-label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .kpi-value { font-size: 1.7rem; font-weight: 800; color: #f1f5f9; }
    .kpi-sub   { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }

    /* Filters */
    .filters {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-end;
    }
    .filter-group { display: flex; flex-direction: column; gap: 5px; }
    .filter-group label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
    .filter-group input,
    .filter-group select {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 7px 12px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color .2s;
      min-width: 160px;
    }
    .filter-group input:focus,
    .filter-group select:focus { border-color: #f97316; }
    .filter-group select option { background: #1e293b; }

    .btn-reset {
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      align-self: flex-end;
    }
    .btn-reset:hover { background: #ea6d10; }

    /* Charts */
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }

    .chart-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 22px;
    }
    .chart-card h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .chart-wrap { position: relative; }

    /* Table */
    .table-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      overflow: hidden;
    }
    .table-header {
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
    }
    .table-header h3 { font-size: 0.9rem; font-weight: 600; color: #cbd5e1; text-transform: uppercase; letter-spacing: .05em; }
    .table-header span { font-size: 0.8rem; color: #64748b; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    thead th {
      background: #0f172a;
      color: #64748b;
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: .06em;
      padding: 12px 16px;
      text-align: left;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: color .2s;
    }
    thead th:hover { color: #f97316; }
    thead th .sort-icon { margin-left: 4px; opacity: .5; }
    thead th.active-sort { color: #f97316; }
    thead th.active-sort .sort-icon { opacity: 1; }

    tbody tr { border-bottom: 1px solid #1e293b; transition: background .15s; }
    tbody tr:hover { background: #243044; }
    tbody td { padding: 11px 16px; color: #cbd5e1; white-space: nowrap; }

    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: .03em;
    }
    .badge-green  { background: rgba(34,197,94,.15); color: #4ade80; }
    .badge-red    { background: rgba(239,68,68,.15);  color: #f87171; }
    .badge-orange { background: rgba(249,115,22,.15); color: #fb923c; }
    .badge-blue   { background: rgba(59,130,246,.15); color: #93c5fd; }
    .badge-gray   { background: rgba(100,116,139,.15);color: #94a3b8; }

    .balance-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .balance-bar {
      height: 6px; border-radius: 3px;
      background: linear-gradient(90deg, #f97316, #fbbf24);
      min-width: 2px;
    }

    tfoot td { padding: 10px 16px; background: #0f172a; color: #64748b; font-size: 0.78rem; }
  </style>
<script>window.__DATA__=[];window.loadData=async function(){try{const r=await fetch("/api/data?report=report-1");if(r.ok){const j=await r.json();if(Array.isArray(j.rows))return j.rows;}}catch(e){}return window.__DATA__;};</script></head>
<body><nav style="position:sticky;top:0;z-index:2147483647;display:flex;align-items:center;gap:12px;padding:8px 14px;background:#0b0f19;color:#e5e7eb;font:500 13px/1.2 system-ui,sans-serif;border-bottom:1px solid #1f2937;">
  <a href="/" style="color:#a5b4fc;text-decoration:none;font-weight:600;">⌂ All reports</a>
  <select onchange="if(this.value)location.href=this.value" style="margin-left:auto;background:#111827;color:#e5e7eb;border:1px solid #374151;border-radius:6px;padding:4px 8px;font:inherit;"><option value="/report-1" selected>Report 1</option><option value="/technician-revenue">Technician Revenue</option></select>
</nav>

<header>
  <div class="logo">🔧</div>
  <div>
    <h1>ServiceTitan Customer Dashboard</h1>
    <p>Top 20 customers by balance · Live data</p>
  </div>
</header>

<div id="loading">
  <div class="spinner"></div>
  <span style="color:#64748b;font-size:.9rem;">Loading customer data…</span>
</div>

<div id="dashboard">

  <!-- KPI Cards -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-group">
      <label>Search Name</label>
      <input type="text" id="filterName" placeholder="e.g. Lockford…" />
    </div>
    <div class="filter-group">
      <label>Type</label>
      <select id="filterType"><option value="">All Types</option></select>
    </div>
    <div class="filter-group">
      <label>Active Status</label>
      <select id="filterActive">
        <option value="">All</option>
        <option value="true">Active</option>
        <option value="false">Inactive</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Do Not Mail</label>
      <select id="filterMail">
        <option value="">All</option>
        <option value="false">Can Mail</option>
        <option value="true">Do Not Mail</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Do Not Service</label>
      <select id="filterService">
        <option value="">All</option>
        <option value="false">Can Service</option>
        <option value="true">Do Not Service</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Sort By</label>
      <select id="sortBy">
        <option value="balance_desc">Balance ↓</option>
        <option value="balance_asc">Balance ↑</option>
        <option value="name_asc">Name A–Z</option>
        <option value="name_desc">Name Z–A</option>
        <option value="created_desc">Newest First</option>
        <option value="created_asc">Oldest First</option>
      </select>
    </div>
    <button class="btn-reset" onclick="resetFilters()">Reset</button>
  </div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="chart-card">
      <h3>Top Customers by Balance</h3>
      <div class="chart-wrap" style="height:280px;">
        <canvas id="barChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>Customer Type Mix</h3>
      <div class="chart-wrap" style="height:280px;">
        <canvas id="donutChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-header">
      <h3>Customer Records</h3>
      <span id="rowCount"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-col="name">Name <span class="sort-icon">↕</span></th>
            <th data-col="type">Type <span class="sort-icon">↕</span></th>
            <th data-col="balance">Balance <span class="sort-icon">↕</span></th>
            <th data-col="active">Active <span class="sort-icon">↕</span></th>
            <th data-col="donotmail">Mail <span class="sort-icon">↕</span></th>
            <th data-col="donotservice">Service <span class="sort-icon">↕</span></th>
            <th data-col="createdon">Created <span class="sort-icon">↕</span></th>
            <th data-col="modifiedon">Modified <span class="sort-icon">↕</span></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot><tr><td colspan="8" id="tableFooter"></td></tr></tfoot>
      </table>
    </div>
  </div>

</div>

<script>
  let ALL_ROWS = [];
  let barChartInst = null;
  let donutChartInst = null;
  let tableSortCol = 'balance';
  let tableSortDir = 'desc';
  let maxBalance = 1;

  const fmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
  const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';

  function getFiltered() {
    const name    = document.getElementById('filterName').value.toLowerCase();
    const type    = document.getElementById('filterType').value;
    const active  = document.getElementById('filterActive').value;
    const mail    = document.getElementById('filterMail').value;
    const service = document.getElementById('filterService').value;
    const sortKey = document.getElementById('sortBy').value;

    let rows = ALL_ROWS.filter(r => {
      if (name    && !r.name.toLowerCase().includes(name)) return false;
      if (type    && r.type !== type) return false;
      if (active  && String(r.active) !== active) return false;
      if (mail    && String(r.donotmail) !== mail) return false;
      if (service && String(r.donotservice) !== service) return false;
      return true;
    });

    rows.sort((a, b) => {
      switch (sortKey) {
        case 'balance_desc': return b.balance - a.balance;
        case 'balance_asc':  return a.balance - b.balance;
        case 'name_asc':     return a.name.localeCompare(b.name);
        case 'name_desc':    return b.name.localeCompare(a.name);
        case 'created_desc': return new Date(b.createdon) - new Date(a.createdon);
        case 'created_asc':  return new Date(a.createdon) - new Date(b.createdon);
        default: return 0;
      }
    });

    return rows;
  }

  function renderKPIs(rows) {
    const total = rows.length;
    const totalBal = rows.reduce((s, r) => s + r.balance, 0);
    const avgBal   = total ? totalBal / total : 0;
    const activeC  = rows.filter(r => String(r.active) === 'true').length;
    const dnm      = rows.filter(r => String(r.donotmail) === 'true').length;
    const dns      = rows.filter(r => String(r.donotservice) === 'true').length;

    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi-card orange">
        <div class="kpi-label">Total Customers</div>
        <div class="kpi-value">${total}</div>
        <div class="kpi-sub">Filtered records</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">Total Balance</div>
        <div class="kpi-value">${fmt.format(totalBal)}</div>
        <div class="kpi-sub">Across all filtered</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Avg Balance</div>
        <div class="kpi-value">${fmt.format(avgBal)}</div>
        <div class="kpi-sub">Per customer</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Active</div>
        <div class="kpi-value">${activeC}</div>
        <div class="kpi-sub">${total ? Math.round(activeC/total*100) : 0}% of filtered</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">Do Not Mail</div>
        <div class="kpi-value">${dnm}</div>
        <div class="kpi-sub">${total ? Math.round(dnm/total*100) : 0}% restricted</div>
      </div>
      <div class="kpi-card purple">
        <div class="kpi-label">Do Not Service</div>
        <div class="kpi-value">${dns}</div>
        <div class="kpi-sub">${total ? Math.round(dns/total*100) : 0}% restricted</div>
      </div>
    `;
  }

  function renderBarChart(rows) {
    const top = [...rows].sort((a,b) => b.balance - a.balance).slice(0, 10);
    const labels = top.map(r => r.name.length > 18 ? r.name.slice(0,16)+'…' : r.name);
    const data   = top.map(r => r.balance);

    if (barChartInst) barChartInst.destroy();
    barChartInst = new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Balance',
          data,
          backgroundColor: data.map((_, i) =>
            `hsla(${22 + i * 6}, 95%, ${55 + i*1.5}%, 0.85)`
          ),
          borderRadius: 6,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: { label: ctx => ' ' + fmt.format(ctx.parsed.y) }
          }
        },
        scales: {
          x: { ticks: { color: '#94a3b8', font: { size: 11 } }, grid: { color: '#1e293b' } },
          y: {
            ticks: { color: '#94a3b8', font: { size: 11 },
              callback: v => fmt.format(v)
            },
            grid: { color: '#334155' }
          }
        }
      }
    });
  }

  function renderDonutChart(rows) {
    const typeCounts = {};
    rows.forEach(r => { typeCounts[r.type] = (typeCounts[r.type] || 0) + 1; });
    const labels = Object.keys(typeCounts);
    const data   = Object.values(typeCounts);
    const colors = ['#f97316','#3b82f6','#22c55e','#a855f7','#ef4444','#eab308'];

    if (donutChartInst) donutChartInst.destroy();
    donutChartInst = new Chart(document.getElementById('donutChart'), {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{
          data,
          backgroundColor: colors.slice(0, labels.length),
          borderColor: '#0f1117',
          borderWidth: 3,
          hoverOffset: 8
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '65%',
        plugins: {
          legend: {
            position: 'bottom',
            labels: { color: '#94a3b8', font: { size: 12 }, padding: 14 }
          },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.label}: ${ctx.parsed} customer${ctx.parsed !== 1 ? 's' : ''}`
            }
          }
        }
      }
    });
  }

  function renderTable(rows) {
    const tbody = document.getElementById('tableBody');
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:32px;color:#64748b;">No records match your filters.</td></tr>`;
      document.getElementById('rowCount').textContent = '0 records';
      document.getElementById('tableFooter').textContent = 'No data to display.';
      return;
    }

    document.getElementById('rowCount').textContent = `${rows.length} record${rows.length !== 1 ? 's' : ''}`;
    const totalBal = rows.reduce((s, r) => s + r.balance, 0);
    document.getElementById('tableFooter').textContent =
      `Showing ${rows.length} records · Total Balance: ${fmt.format(totalBal)}`;

    tbody.innerHTML = rows.map(r => {
      const bal = parseFloat(r.balance) || 0;
      const barW = maxBalance > 0 ? Math.max(2, Math.round((bal / maxBalance) * 80)) : 2;
      const typeBadge = r.type === 'Residential' ? 'badge-blue' :
                        r.type === 'Commercial'  ? 'badge-orange' : 'badge-gray';
      return `<tr>
        <td><strong style="color:#f1f5f9">${r.name}</strong><br><span style="color:#475569;font-size:.75rem">ID: ${r.id}</span></td>
        <td><span class="badge ${typeBadge}">${r.type || '—'}</span></td>
        <td>
          <div class="balance-bar-wrap">
            <div class="balance-bar" style="width:${barW}px"></div>
            <span>${fmt.format(bal)}</span>
          </div>
        </td>
        <td><span class="badge ${r.active === 'true' || r.active === true ? 'badge-green' : 'badge-red'}">${r.active === 'true' || r.active === true ? 'Active' : 'Inactive'}</span></td>
        <td><span class="badge ${r.donotmail === 'true' || r.donotmail === true ? 'badge-red' : 'badge-green'}">${r.donotmail === 'true' || r.donotmail === true ? '🚫 DNM' : '✓ OK'}</span></td>
        <td><span class="badge ${r.donotservice === 'true' || r.donotservice === true ? 'badge-red' : 'badge-green'}">${r.donotservice === 'true' || r.donotservice === true ? '🚫 DNS' : '✓ OK'}</span></td>
        <td>${fmtDate(r.createdon)}</td>
        <td>${fmtDate(r.modifiedon)}</td>
      </tr>`;
    }).join('');
  }

  function render() {
    const rows = getFiltered();
    renderKPIs(rows);
    renderBarChart(rows);
    renderDonutChart(rows);
    renderTable(rows);
  }

  function resetFilters() {
    document.getElementById('filterName').value = '';
    document.getElementById('filterType').value = '';
    document.getElementById('filterActive').value = '';
    document.getElementById('filterMail').value = '';
    document.getElementById('filterService').value = '';
    document.getElementById('sortBy').value = 'balance_desc';
    render();
  }

  ['filterName','filterType','filterActive','filterMail','filterService','sortBy'].forEach(id => {
    document.getElementById(id).addEventListener('input', render);
    document.getElementById(id).addEventListener('change', render);
  });

  (async () => {
    const rows = await loadData();
    ALL_ROWS = rows.map(r => ({ ...r, balance: parseFloat(r.balance) || 0 }));
    maxBalance = Math.max(...ALL_ROWS.map(r => r.balance), 1);

    // Populate type filter
    const types = [...new Set(ALL_ROWS.map(r => r.type).filter(Boolean))].sort();
    const sel = document.getElementById('filterType');
    types.forEach(t => {
      const o = document.createElement('option');
      o.value = t; o.textContent = t;
      sel.appendChild(o);
    });

    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    render();
  })();
</script>
</body>
</html>
